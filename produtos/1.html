<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Porta-lápis T-REX - Descomplica3D Brasil</title>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../styles.css"/>
  
  <style>
    #btn3d.active-view, #btnImage.active-view {
      background-color: rgb(168 85 247);
      color: white;
      box-shadow: 0 10px 15px -3px rgba(131, 16, 185, 0.3);
    }
    #btn3d:not(.active-view), #btnImage:not(.active-view) {
      color: #a1a1aa;
    }
    #btn3d:hover:not(.active-view), #btnImage:hover:not(.active-view) {
      color: white;
      background-color: #27272a;
    }
    model-viewer {
      width: 100%;
      height: 520px;
      background-color: #18181b;
    }
    .ar-instructions {
      position: absolute;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.8);
      color: white;
      padding: 12px 24px;
      border-radius: 9999px;
      font-size: 0.95rem;
      white-space: nowrap;
      z-index: 30;
      display: none;
    }
  </style>

  <script src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.2.0/model-viewer.min.js" 
          type="module"></script>
</head>
<body class="bg-zinc-950 text-white">

  <!-- NAV (mantida igual) -->
  <nav class="relative z-[100] bg-black border-b border-zinc-800 sticky top-0">
    <!-- ... seu nav original ... -->
  </nav>

  <main class="max-w-7xl mx-auto px-6 py-12">
    <a href="../index.html" class="inline-flex items-center gap-2 text-purple-400 hover:text-purple-300 mb-10 text-lg">
      <i class="fa-solid fa-arrow-left"></i> Voltar para a loja
    </a>

    <div class="grid md:grid-cols-2 gap-12 lg:gap-16">
      
      <!-- VISUAL AREA -->
      <div class="rounded-3xl overflow-hidden shadow-2xl shadow-purple-900/30 bg-zinc-900 relative">

        <!-- Toggle buttons -->
        <div class="absolute top-6 left-6 z-40 flex gap-1 bg-zinc-900/95 backdrop-blur-2xl rounded-3xl p-2 border border-zinc-700 shadow-2xl">
          <button onclick="showView('3d')" id="btn3d" class="px-7 py-3 rounded-2xl text-sm font-medium transition-all flex items-center gap-2 active-view">
            <span>3D</span>
          </button>
          <button onclick="showView('image')" id="btnImage" class="px-7 py-3 rounded-2xl text-sm font-medium transition-all flex items-center gap-2">
            <span>IMG</span>
          </button>
        </div>

        <!-- 3D VIEWER -->
        <div id="view3d">
          <model-viewer 
            id="modelViewer"
            src="../modelos/dino.glb"
            alt="Porta-lápis T-REX"
            auto-rotate 
            camera-controls 
            shadow-intensity="2.5"
            shadow-softness="0.8"
            exposure="0.9"
            environment-intensity="0.85"
            ar
            ar-modes="webxr scene-viewer quick-look"
            ar-scale="fixed"
            ar-placement="floor"
            xr-environment
            camera-orbit="45deg 55deg 2.5m"
            field-of-view="30deg"
            min-camera-orbit="auto auto 0.5m"
            max-camera-orbit="auto auto 5m"
            touch-action="pan-y"
            loading="eager"
            style="width: 100%; height: 520px;">
          </model-viewer>

          <!-- Botão AR aprimorado -->
          <button onclick="activateAR()" 
                  class="absolute bottom-6 left-1/2 -translate-x-1/2 
                         bg-purple-600 hover:bg-purple-500 
                         text-white px-8 py-4 rounded-2xl font-medium 
                         flex items-center gap-3 shadow-xl transition-all active:scale-95 z-30">
            <i class="fa-solid fa-cube"></i>
            Ver em Realidade Aumentada (AR)
          </button>

          <div id="arInstructions" class="ar-instructions">
            Mova o celular para detectar o chão • Toque para posicionar
          </div>
        </div>

        <!-- Carrossel de imagens (mantido igual) -->
        <div id="viewImage" class="hidden flex flex-col">
          <!-- ... seu carrossel original ... -->
        </div>
      </div>

      <!-- INFO DO PRODUTO (mantido) -->
      <div class="flex flex-col">
        <!-- ... seu conteúdo original ... -->
        <div class="text-purple-400 text-sm uppercase tracking-wide mb-2">suportes</div>
        <h1 class="text-4xl md:text-5xl font-bold tracking-tight mb-6">Porta-lápis T-REX de dinossauro</h1>
        <div class="text-5xl font-bold text-purple-400 mb-8">R$ 89,90</div>
        <!-- ... resto ... -->
      </div>
    </div>
  </main>

  <footer><!-- ... --></footer>

  <script src="../script.js"></script>
  <script>
    const modelViewer = document.getElementById('modelViewer');
    const arInstructions = document.getElementById('arInstructions');

    function activateAR() {
      if (modelViewer && modelViewer.activateAR) {
        arInstructions.style.display = 'block';
        modelViewer.activateAR();
      } else {
        alert("AR não disponível neste dispositivo/navegador.");
      }
    }

    // Ocultar instruções quando AR iniciar
    modelViewer.addEventListener('ar-status', (event) => {
      if (event.detail.status === 'session-started') {
        arInstructions.style.display = 'none';
      }
    });

    // Toggle views (mantido)
    function showView(view) {
      document.getElementById('view3d').classList.toggle('hidden', view !== '3d');
      document.getElementById('viewImage').classList.toggle('hidden', view !== 'image');
      document.getElementById('btn3d').classList.toggle('active-view', view === '3d');
      document.getElementById('btnImage').classList.toggle('active-view', view === 'image');
    }

    // Inicialização
    window.addEventListener('load', () => {
      showView('3d');
      // Seu código de thumbnails...
    });
  </script>
</body>
</html>
